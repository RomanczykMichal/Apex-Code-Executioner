<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}';">
	<link rel="stylesheet" href="{{styleUri}}">
</head>
<body>
	<label for="org" class="org-label">Salesforce Org</label>
	<select id="org">
		<option value="">Loading orgs...</option>
	</select>
	<div class="tab-bar">
		<button class="tab-button active" type="button" data-tab="apex">Anonymous Apex</button>
		<button class="tab-button" type="button" data-tab="debug">Debug Logs Manager</button>
	</div>
	<div class="tab-content active" id="tab-apex">
		<div class="editor-wrap">
			<pre class="highlight" aria-hidden="true"><code id="highlightCode"></code></pre>
			<textarea id="input" maxlength="{{maxInputLength}}" placeholder="Enter Apex code..." spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
		</div>
		<div>
			<button id="execute">Execute</button>
			<button id="openResult" type="button">Open Debug Log</button>
		</div>
		<p id="status"></p>
	</div>
	<div class="tab-content" id="tab-debug">
		<p class="hint">Set, extend, and remove debug trace flags for users in the selected org.</p>
		<button id="manageTraceFlags" type="button">Manage Trace Flags</button>
		<p id="traceStatus"></p>

		<div class="logs-header">
			<span class="logs-title">Log Entries</span>
			<button id="refreshLogs" type="button">Refresh</button>
		</div>
		<p id="logsStatus" class="hint"></p>
		<div class="logs-table-wrap">
			<table id="logsTable" class="hidden">
				<thead>
					<tr>
						<th>User</th>
						<th>Operation</th>
						<th>Status</th>
						<th>Size</th>
						<th>Time</th>
					</tr>
				</thead>
				<tbody id="logsBody"></tbody>
			</table>
		</div>
	</div>
	<script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
